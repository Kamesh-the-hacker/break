body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    transition: all 1s ease;
    overflow: hidden;
}

/* START SCREEN */
#start {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(#ff4d6d, #ff758c);
    color: white;
    flex-direction: column;
}

/* PASSWORD */
#lock {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: #111;
    color: white;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

/* MAIN */
.container {
    padding: 40px 15px;
    animation: fade 1s;
}

@keyframes fade {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    background: #ff4d6d;
    color: white;
}

/* THEMES */
.phase1 { background: linear-gradient(#ffdde1,#ee9ca7);}
.phase2 { background: linear-gradient(#ff4d6d,#ff758c);}
.phase3 { background: linear-gradient(#ff758c,#ff7eb3);}
.phase4 { background: linear-gradient(#2c2c2c,#000);}
.phase5 { background: black; }

/* HEART */
.heart {
    position: absolute;
    animation: float 5s linear infinite;
}
@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* RAIN */
.rain {
    position: absolute;
    width: 2px;
    height: 20px;
    background: white;
    animation: rain 0.5s linear infinite;
}
@keyframes rain {
    from {transform: translateY(-100vh);}
    to {transform: translateY(100vh);}
}

/* BLACKOUT */
#blackout {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    color: white;
}
</style>

function typeWriter(text, el, i=0){
    if(i<text.length){
        el.innerHTML+=text.charAt(i);
        setTimeout(()=>typeWriter(text,el,i+1),25);
    }
}

function loadPhase(){
    let d=data[phase];
    document.body.className="phase"+(phase+1);

    document.getElementById("title").innerText=d.title;
    let el=document.getElementById("text");
    el.innerHTML="";
    typeWriter(d.text,el);

    if(phase==1) hearts();
    if(phase==3) rain();
}

function next(){
    if(phase<data.length-1){
        phase++;
        loadPhase();
    } else {
        end();
    }
}

function hearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.style.left=Math.random()*100+"vw";
        h.innerHTML="❤️";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },300);
}

function rain(){
    setInterval(()=>{
        let r=document.createElement("div");
        r.className="rain";
        r.style.left=Math.random()*100+"vw";
        document.body.appendChild(r);
        setTimeout(()=>r.remove(),500);

}
